<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saham Gerai Hisana</title>
  <style>
    /* Reset style bawaan browser */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Mencegah double scrollbar di browser utama */
      background-color: #f3fbf6;
    }

    /* Pembungkus Iframe khusus agar sangat responsif di HP */
    .dashboard-container {
      position: relative;
      width: 100%;
      height: 100vh; /* Standar layar desktop */
      height: 100svh; /* Akurat untuk browser HP agar tidak kepotong bar url */
      overflow: hidden;
      -webkit-overflow-scrolling: touch; /* Scroll halus di perangkat iOS */
    }

    .dashboard-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div class="dashboard-container">
    <iframe src="https://script.google.com/macros/s/AKfycbzU6wB-b08rUr0Yk8V9AvXeFUt6Zom3w0yZcRR8natCowcuMRq9_CLo3dvw5qbDrpuOnA/exec"></iframe>
  </div>

</body>
</html>
